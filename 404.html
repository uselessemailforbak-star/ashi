<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #fff0f3;
            font-family: 'Poppins', sans-serif;
            text-align: center;
        }
        .container {
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            color: #ff4d6d;
            margin: 0;
        }
        p {
            color: #666;
            font-size: 1.2rem;
        }
        a {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 12px 30px;
            background-color: #ff85a2;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s ease;
        }
        a:hover {
            background-color: #ff4d6d;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Oops! Page not found. Let's get back to the apology! 💖</p>
        <a href="/">Go Home</a>
    </div>
</body>
</html>
