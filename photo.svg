<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#ff85a2"/>
  
  <!-- Face -->
  <circle cx="100" cy="85" r="50" fill="#fdbcb4"/>
  
  <!-- Eyes -->
  <circle cx="85" cy="75" r="6" fill="#333"/>
  <circle cx="115" cy="75" r="6" fill="#333"/>
  
  <!-- Sad mouth -->
  <path d="M 85 95 Q 100 85 115 95" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Tears -->
  <circle cx="85" cy="105" r="4" fill="#b3d9ff"/>
  <circle cx="115" cy="105" r="4" fill="#b3d9ff"/>
  
  <!-- Hearts -->
  <text x="140" y="140" font-size="40" text-anchor="middle">💖</text>
  <text x="60" y="140" font-size="40" text-anchor="middle">💔</text>
  
  <!-- Text -->
  <text x="100" y="170" font-family="Poppins, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#333">Replace with Your Photo</text>
</svg>